services:
  nginx:
    image: nginx:1.27-alpine
    container_name: proconnect_nginx
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
      - livekit
    networks:
      - public
      - proconnect_internal
    restart: unless-stopped

  frontend:
    image: ${FRONTEND_IMAGE}:latest
    container_name: proconnect_frontend
    env_file:
      - .env
    expose:
      - "4000"
    networks:
      - proconnect_internal
    restart: unless-stopped

  backend:
    image: ${BACKEND_IMAGE}:latest
    container_name: proconnect_backend
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      mongodb:
        condition: service_started
    expose:
      - "9000"
    networks:
      - proconnect_internal
    restart: unless-stopped

  horizon:
    image: ${BACKEND_IMAGE}:latest
    container_name: proconnect_horizon
    env_file:
      - .env
    command: php artisan horizon
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      mongodb:
        condition: service_started
    networks:
      - proconnect_internal
    restart: unless-stopped

  scheduler:
    image: ${BACKEND_IMAGE}:latest
    container_name: proconnect_scheduler
    env_file:
      - .env
    command: php artisan schedule:work
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      mongodb:
        condition: service_started
    networks:
      - proconnect_internal
    restart: unless-stopped

  postgres:
    image: postgres:18-alpine
    container_name: proconnect_postgres
    environment:
      PGPASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - proconnect_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -q -d ${DB_DATABASE} -U ${DB_USERNAME}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: proconnect_redis
    volumes:
      - redis_data:/data
    networks:
      - proconnect_internal
    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: proconnect_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGODB_DATABASE}
    volumes:
      - mongodb_data:/data/db
    networks:
      - proconnect_internal
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.adminCommand({ ping: 1 }).ok' -u ${MONGODB_USERNAME} -p ${MONGODB_PASSWORD} --authenticationDatabase admin | grep 1"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  livekit:
    image: livekit/livekit-server:latest
    container_name: proconnect_livekit
    command: --config /etc/livekit/livekit.yaml
    volumes:
      - ./docker/livekit/livekit.yaml:/etc/livekit/livekit.yaml:ro
    expose:
      - "7880"
    ports:
      - "7881:7881/tcp"
      - "60000-60100:60000-60100/udp"
    networks:
      - proconnect_internal
    restart: unless-stopped
    
  reverb:
    image: ${BACKEND_IMAGE}:latest
    container_name: proconnect_reverb
    env_file:
      - .env
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      mongodb:
        condition: service_started
    expose:
      - "8080"
    networks:
      - proconnect_internal
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  mongodb_data:

networks:
  public:
    external: true

  proconnect_internal:
    driver: bridge
